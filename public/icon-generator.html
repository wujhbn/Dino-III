<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c180" width="180" height="180"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size / 512;
  
  // Background gradient - pastel green
  const bg = ctx.createLinearGradient(0, 0, 0, size);
  bg.addColorStop(0, '#c8f5c8');
  bg.addColorStop(1, '#a8e6a8');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, 80*s);
  ctx.fill();
  
  // Ground
  ctx.fillStyle = '#7dc87d';
  ctx.beginPath();
  ctx.roundRect(0, size*0.75, size, size*0.25, [0,0,80*s,80*s]);
  ctx.fill();
  
  // Body - big round Q-version dino
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(size*0.48, size*0.52, size*0.22, size*0.20, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Head - big cute head
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(size*0.52, size*0.30, size*0.18, size*0.17, -0.1, 0, Math.PI*2);
  ctx.fill();
  
  // Snout
  ctx.fillStyle = '#7dc87d';
  ctx.beginPath();
  ctx.ellipse(size*0.65, size*0.33, size*0.08, size*0.06, 0.2, 0, Math.PI*2);
  ctx.fill();
  
  // Eye white
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(size*0.55, size*0.26, size*0.065, size*0.07, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Eye pupil
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(size*0.565, size*0.265, size*0.038, size*0.045, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Eye shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(size*0.578, size*0.252, size*0.013, size*0.015, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Cheek blush
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath();
  ctx.ellipse(size*0.63, size*0.31, size*0.04, size*0.025, 0.3, 0, Math.PI*2);
  ctx.fill();
  
  // Spikes on back
  ctx.fillStyle = '#3d7a3d';
  const spikes = [[0.38,0.16],[0.44,0.13],[0.50,0.12],[0.56,0.13]];
  spikes.forEach(([bx,by]) => {
    ctx.beginPath();
    ctx.moveTo(bx*size, by*size);
    ctx.lineTo((bx-0.035)*size, (by+0.085)*size);
    ctx.lineTo((bx+0.035)*size, (by+0.085)*size);
    ctx.closePath();
    ctx.fill();
  });
  
  // Belly
  ctx.fillStyle = '#a8d8a8';
  ctx.beginPath();
  ctx.ellipse(size*0.45, size*0.54, size*0.13, size*0.12, 0.1, 0, Math.PI*2);
  ctx.fill();
  
  // Tail
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.moveTo(size*0.28, size*0.52);
  ctx.quadraticCurveTo(size*0.15, size*0.58, size*0.20, size*0.68);
  ctx.quadraticCurveTo(size*0.25, size*0.65, size*0.32, size*0.60);
  ctx.closePath();
  ctx.fill();
  
  // Arms
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(size*0.60, size*0.50, size*0.045, size*0.07, 0.5, 0, Math.PI*2);
  ctx.fill();
  
  // Legs
  ctx.fillStyle = '#4a8a4a';
  ctx.beginPath();
  ctx.roundRect(size*0.38, size*0.65, size*0.08, size*0.12, 6*s);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(size*0.49, size*0.65, size*0.08, size*0.12, 6*s);
  ctx.fill();
  
  // Feet
  ctx.fillStyle = '#3d7a3d';
  ctx.beginPath();
  ctx.ellipse(size*0.42, size*0.775, size*0.055, size*0.03, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(size*0.53, size*0.775, size*0.055, size*0.03, -0.1, 0, Math.PI*2);
  ctx.fill();
  
  // Stars decoration
  ctx.fillStyle = 'rgba(255,255,150,0.8)';
  [[0.15,0.20],[0.82,0.15],[0.85,0.55]].forEach(([sx,sy]) => {
    ctx.beginPath();
    ctx.arc(sx*size, sy*size, 8*s, 0, Math.PI*2);
    ctx.fill();
  });
}

const c512 = document.getElementById('c512');
const c192 = document.getElementById('c192');
const c180 = document.getElementById('c180');
drawIcon(c512, 512);
drawIcon(c192, 192);
drawIcon(c180, 180);

// Export as data URLs
setTimeout(() => {
  document.getElementById('url512').textContent = c512.toDataURL('image/png');
  document.getElementById('url192').textContent = c192.toDataURL('image/png');
  document.getElementById('url180').textContent = c180.toDataURL('image/png');
}, 100);
</script>
<div id="url512" style="word-break:break-all;font-size:10px"></div>
<div id="url192" style="word-break:break-all;font-size:10px"></div>
<div id="url180" style="word-break:break-all;font-size:10px"></div>
</body>
</html>
