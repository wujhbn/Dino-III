<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>ぴょんぴょん恐竜</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ぴょん竜">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#5a9e5a">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#c8f5c8;font-family:'Hiragino Maru Gothic Pro','Rounded Mplus 1c',sans-serif;}
#game-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#e8f8ff 0%,#c8f5c8 60%,#a8e6a8 100%);}
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;position:absolute;top:0;left:0;right:0;z-index:10;}
.lives{display:flex;gap:6px;}
.heart{font-size:22px;transition:transform 0.3s;}
.heart.lost{filter:grayscale(1);opacity:0.35;transform:scale(0.85);}
#score-box{text-align:center;text-shadow:0 2px 4px rgba(255,255,255,0.8);}
#score{font-size:24px;font-weight:700;color:#2d6a2d;letter-spacing:2px;}
#hi-score{font-size:12px;color:#5a8a5a;font-weight:bold;}
#canvas-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0;}
#canvas-box{position:relative;width:100%;height:100%;}
canvas{width:100%;height:100%;display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0);transition:background 0.3s;pointer-events:none;}
#overlay.show{pointer-events:auto;background:rgba(200,245,200,0.88);}
#overlay-box{display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;}
#overlay.show #overlay-box{display:flex;}
#overlay-emoji{font-size:64px;line-height:1;animation:bob 1s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
#overlay-title{font-size:26px;font-weight:700;color:#2d6a2d;}
#overlay-sub{font-size:14px;color:#5a8a5a;}
#overlay-score{font-size:18px;font-weight:700;color:#3d8a3d;}
#start-btn{margin-top:8px;padding:14px 36px;background:#5a9e5a;color:#fff;border:none;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #3d7a3d;transition:transform 0.1s,box-shadow 0.1s;font-family:inherit;}
#start-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3d7a3d;}
#tap-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:12px;color:#7aaa7a;opacity:0.8;white-space:nowrap;}
#hud-right{display:flex;align-items:center;gap:8px;}
.hud-btn{width:38px;height:38px;border-radius:50%;border:2px solid #4a8a4a;background:rgba(255,255,255,0.7);color:#2d6a2d;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s,background 0.1s;-webkit-tap-highlight-color:transparent;}
.hud-btn:active{transform:scale(0.9);background:rgba(200,240,200,0.9);}
#pause-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(200,245,200,0.92);z-index:20;}
#pause-overlay.show{display:flex;}
#pause-emoji{font-size:52px;margin-bottom:8px;}
#pause-title{font-size:28px;font-weight:700;color:#2d6a2d;margin-bottom:6px;}
#pause-sub{font-size:13px;color:#5a8a5a;margin-bottom:18px;}
#resume-btn{padding:13px 34px;background:#5a9e5a;color:#fff;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #3d7a3d;transition:transform 0.1s,box-shadow 0.1s;font-family:inherit;}
#resume-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3d7a3d;}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="hud">
    <div class="lives" id="lives"></div>
    <div id="score-box">
      <div id="score">00000</div>
      <div id="hi-score">BEST: 00000</div>
    </div>
    <div id="hud-right">
      <button class="hud-btn" id="music-btn" title="音楽">♪</button>
      <button class="hud-btn" id="pause-btn" title="一時停止">⏸</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="canvas-box">
    <canvas id="c"></canvas>
    <div id="overlay" class="show">
      <div id="overlay-box">
        <div id="overlay-emoji">🦕</div>
        <div id="overlay-title">ぴょんぴょん恐竜</div>
        <div id="overlay-sub">タップまたはスペースでジャンプ！</div>
        <div id="overlay-score" style="display:none"></div>
        <button id="start-btn">あそぶ ▶</button>
      </div>
    </div>
    <div id="pause-overlay">
      <div id="pause-emoji">⏸️</div>
      <div id="pause-title">一時停止</div>
      <div id="pause-sub">ポーズ中… タップで再開</div>
      <button id="resume-btn">つづける ▶</button>
    </div>
    <div id="tap-hint">タップ or スペース でジャンプ</div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const hiEl = document.getElementById('hi-score');
const overlayScore = document.getElementById('overlay-score');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const overlayEmoji = document.getElementById('overlay-emoji');

let W, H, GY; // canvas dims, ground Y

// ── Game state ─────────────────────────────────────────
let state = 'idle'; // idle | playing | dead | gameover
let score = 0, hiScore = +(localStorage.getItem('dino_hi')||0);
let lives = 3;
let frame = 0, speed = 0, baseSpeed = 4;
let lastScoreSound = 0;
let invincible = 0; // frames of invincibility after hit

// ── Dino ───────────────────────────────────────────────
const dino = {
  x: 0, y: 0, w: 52, h: 60,
  vy: 0, onGround: true,
  legPhase: 0,
  dead: false,
  jumpPower: -16,
  jump() {
    if (this.onGround && state === 'playing') {
      this.vy = this.jumpPower;
      this.onGround = false;
      playSound('jump');
    }
  }
};

// ── Obstacles ──────────────────────────────────────────
let obstacles = [];
let obsCooldown = 0;
const OBS_TYPES = ['cactus','rock','coin','bird'];

// ── Clouds / BG deco ──────────────────────────────────
let clouds = [];
let bgStars = [];

// ── Particles ─────────────────────────────────────────
let particles = [];

// ── Audio ─────────────────────────────────────────────
let audioCtx;
let bgmPlaying = false;
let bgmNodes = null; // { osc, gain, interval }
let musicOn = true;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// BGM: 輕快的8bit風格旋律，用 Web Audio 合成
const BGM_MELODY = [
  // 音符: [頻率Hz, 拍數]  (C4=261.6, D=293.7, E=329.6, F=349.2, G=392, A=440, B=493.9, C5=523.3)
  [392,0.5],[440,0.5],[523,1],[440,0.5],[392,0.5],
  [349,0.5],[392,0.5],[440,1],[0,0.5],[440,0.5],
  [523,0.5],[587,0.5],[659,1],[587,0.5],[523,0.5],
  [493,0.5],[523,0.5],[587,1],[0,1],
  [329,0.5],[392,0.5],[440,1],[392,0.5],[349,0.5],
  [293,0.5],[329,0.5],[392,1],[0,0.5],[329,0.5],
  [392,0.5],[440,0.5],[493,0.5],[523,0.5],[587,0.5],[659,0.5],
  [523,0.5],[440,0.5],[392,1],[0,1],
];

function startBGM() {
  if (!musicOn) return;
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
    stopBGM();

    const masterGain = ac.createGain();
    masterGain.gain.setValueAtTime(0.10, ac.currentTime);
    masterGain.connect(ac.destination);

    // 合成器：方波旋律 + 三角波低音
    let noteIdx = 0;
    let nextTime = ac.currentTime + 0.05;
    const BPM = 160;
    const beatSec = 60 / BPM;

    function scheduleNotes() {
      while (nextTime < ac.currentTime + 0.3) {
        const [freq, beats] = BGM_MELODY[noteIdx % BGM_MELODY.length];
        const dur = beats * beatSec;
        if (freq > 0) {
          // 主旋律 - 方波
          const o = ac.createOscillator();
          const g = ac.createGain();
          o.type = 'square';
          o.frequency.setValueAtTime(freq, nextTime);
          g.gain.setValueAtTime(0.0, nextTime);
          g.gain.linearRampToValueAtTime(0.35, nextTime + 0.01);
          g.gain.linearRampToValueAtTime(0.28, nextTime + dur * 0.6);
          g.gain.linearRampToValueAtTime(0.0, nextTime + dur * 0.9);
          o.connect(g); g.connect(masterGain);
          o.start(nextTime); o.stop(nextTime + dur);

          // 低音 - 三角波（低八度）
          const ob = ac.createOscillator();
          const gb = ac.createGain();
          ob.type = 'triangle';
          ob.frequency.setValueAtTime(freq / 2, nextTime);
          gb.gain.setValueAtTime(0.18, nextTime);
          gb.gain.linearRampToValueAtTime(0.0, nextTime + dur * 0.7);
          ob.connect(gb); gb.connect(masterGain);
          ob.start(nextTime); ob.stop(nextTime + dur);
        }
        nextTime += dur;
        noteIdx++;
      }
    }

    scheduleNotes();
    const intervalId = setInterval(scheduleNotes, 150);
    bgmNodes = { masterGain, intervalId };
    bgmPlaying = true;
  } catch(e) {}
}

function stopBGM() {
  if (bgmNodes) {
    clearInterval(bgmNodes.intervalId);
    try { bgmNodes.masterGain.gain.setValueAtTime(0, audioCtx.currentTime); } catch(e){}
    bgmNodes = null;
  }
  bgmPlaying = false;
}

function pauseBGM() {
  if (audioCtx && bgmPlaying) {
    audioCtx.suspend();
  }
}

function resumeBGM() {
  if (audioCtx && musicOn && bgmPlaying) {
    audioCtx.resume();
  }
}

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById('music-btn');
  if (musicOn) {
    btn.textContent = '♪';
    btn.style.opacity = '1';
    if (state === 'playing') startBGM();
  } else {
    btn.textContent = '♪';
    btn.style.opacity = '0.35';
    stopBGM();
  }
}

function playSound(type) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    if (type==='jump') { o.frequency.setValueAtTime(520,ac.currentTime); o.frequency.exponentialRampToValueAtTime(780,ac.currentTime+0.08); g.gain.setValueAtTime(0.12,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12); }
    else if (type==='hit') { o.type='sawtooth'; o.frequency.setValueAtTime(220,ac.currentTime); o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.25); g.gain.setValueAtTime(0.18,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
    else if (type==='score') { o.type='sine'; o.frequency.setValueAtTime(880,ac.currentTime); o.frequency.exponentialRampToValueAtTime(1320,ac.currentTime+0.06); g.gain.setValueAtTime(0.10,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12); }
    else if (type==='coin') { o.type='sine'; o.frequency.setValueAtTime(1046,ac.currentTime); o.frequency.exponentialRampToValueAtTime(1568,ac.currentTime+0.08); g.gain.setValueAtTime(0.12,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15); }
    o.start(ac.currentTime); o.stop(ac.currentTime+0.35);
  } catch(e){}
}

// ── Resize ─────────────────────────────────────────────
function resize() {
  const box = document.getElementById('canvas-box');
  const dpr = window.devicePixelRatio || 1;
  const cssW = box.clientWidth;
  const cssH = box.clientHeight;
  
  // Set a base logical height so the images are not excessively large
  const logicalH = 400;
  let scale = cssH / logicalH;
  
  // If in a narrow portrait, base the scale on width instead so it fits
  if (cssW / cssH < 0.8) {
    scale = cssW / 360;
  }
  
  // The logical game coordinate dimensions
  W = cssW / scale; 
  H = cssH / scale;
  
  // The actual physical canvas resolution (makes it sharp)
  canvas.width = Math.floor(W * scale * dpr); 
  canvas.height = Math.floor(H * scale * dpr);
  
  // Scale the drawing context so we can just draw to W x H
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

  GY = H - 55; // ground line
  
  dino.x = Math.min(W * 0.15, 120);
  if (!dino.onGround) dino.y = GY - dino.h;
  else dino.y = GY - dino.h;
  
  dino.jumpPower = -16;
  baseSpeed = 6;
  
  // Re-distribute backgrounds dynamically so they span the new width
  if (W > 0) initBg();
}
window.addEventListener('resize', resize);
resize();

// Init clouds & stars
function initBg() {
  clouds = [];
  for (let i=0;i<4;i++) clouds.push({x: Math.random()*W, y: 20+Math.random()*40, w: 60+Math.random()*50, speed: 0.4+Math.random()*0.3});
  bgStars = [];
  for (let i=0;i<12;i++) bgStars.push({x:Math.random()*W,y:Math.random()*(GY*0.4),r:1.5+Math.random()*2,a:0.4+Math.random()*0.5,phase:Math.random()*Math.PI*2});
}
initBg();

// ── Draw helpers ───────────────────────────────────────

function drawDino(x, y, legPhase, alpha, shake) {
  ctx.save();
  ctx.globalAlpha = alpha;
  if (shake) { x += (Math.random()-0.5)*4; }
  
  const w = dino.w, h = dino.h;
  const cx = x + w*0.5;
  const cy = y + h*0.5;
  
  // --- Tail ---
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.moveTo(x+5, y+h*0.55);
  ctx.quadraticCurveTo(x-10, y+h*0.65, x-5, y+h*0.82);
  ctx.quadraticCurveTo(x+5, y+h*0.78, x+12, y+h*0.68);
  ctx.closePath();
  ctx.fill();
  
  // --- Spikes ---
  ctx.fillStyle = '#3d7a3d';
  const spikeBase = y + h*0.12;
  [0.25,0.38,0.50,0.62].forEach((px,i) => {
    const sx = x + w*px;
    ctx.beginPath();
    ctx.moveTo(sx, spikeBase - 10 + (i===1||i===2?-3:0));
    ctx.lineTo(sx-6, spikeBase+2);
    ctx.lineTo(sx+6, spikeBase+2);
    ctx.closePath();
    ctx.fill();
  });
  
  // --- Body ---
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(cx, y+h*0.60, w*0.42, h*0.30, 0, 0, Math.PI*2);
  ctx.fill();
  
  // --- Head ---
  const hcx = cx + w*0.12;
  const hcy = y + h*0.25;
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(hcx, hcy, w*0.33, h*0.26, -0.1, 0, Math.PI*2);
  ctx.fill();
  
  // Snout
  ctx.fillStyle = '#7dc87d';
  ctx.beginPath();
  ctx.ellipse(hcx+w*0.25, hcy+h*0.06, w*0.14, h*0.10, 0.2, 0, Math.PI*2);
  ctx.fill();
  
  // Mouth smile
  ctx.strokeStyle = '#3d7a3d';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(hcx+w*0.26, hcy+h*0.10, 6, 0, Math.PI);
  ctx.stroke();
  
  // --- Belly ---
  ctx.fillStyle = '#a8d8a8';
  ctx.beginPath();
  ctx.ellipse(cx-w*0.05, y+h*0.62, w*0.24, h*0.20, 0.1, 0, Math.PI*2);
  ctx.fill();
  
  // --- Arms ---
  ctx.fillStyle = '#5a9e5a';
  ctx.beginPath();
  ctx.ellipse(cx+w*0.32, y+h*0.52, w*0.08, h*0.13, 0.5, 0, Math.PI*2);
  ctx.fill();
  
  // --- Legs (animated) ---
  const legSwing = Math.sin(legPhase) * 6;
  ctx.fillStyle = '#4a8a4a';
  // Left leg
  ctx.save();
  ctx.translate(cx-w*0.12, y+h*0.85);
  ctx.rotate(legSwing*0.05);
  ctx.fillRect(-6, 0, 12, h*0.22);
  ctx.fillStyle='#3d7a3d';
  ctx.beginPath();
  ctx.ellipse(2, h*0.22+4, 10, 5, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Right leg
  ctx.fillStyle = '#4a8a4a';
  ctx.save();
  ctx.translate(cx+w*0.06, y+h*0.85);
  ctx.rotate(-legSwing*0.05);
  ctx.fillRect(-6, 0, 12, h*0.22);
  ctx.fillStyle='#3d7a3d';
  ctx.beginPath();
  ctx.ellipse(-2, h*0.22+4, 10, 5, -0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  // --- Eye ---
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(hcx+w*0.10, hcy-h*0.04, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(hcx+w*0.12, hcy-h*0.03, w*0.065, h*0.085, 0, 0, Math.PI*2);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(hcx+w*0.14, hcy-h*0.06, w*0.025, h*0.03, 0, 0, Math.PI*2);
  ctx.fill();
  // Blush
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath();
  ctx.ellipse(hcx+w*0.28, hcy+h*0.04, w*0.07, h*0.04, 0.3, 0, Math.PI*2);
  ctx.fill();
  
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCactus(obs) {
  const {x,y,w,h} = obs;
  ctx.fillStyle = '#e86b3a';
  // Main trunk
  ctx.beginPath();
  ctx.roundRect(x+w*0.38, y+h*0.3, w*0.24, h*0.7, 6);
  ctx.fill();
  // Left arm
  ctx.beginPath();
  ctx.roundRect(x+w*0.10, y+h*0.15, w*0.30, h*0.18, 5);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x+w*0.10, y, w*0.18, h*0.30, 5);
  ctx.fill();
  // Right arm
  ctx.beginPath();
  ctx.roundRect(x+w*0.60, y+h*0.25, w*0.30, h*0.18, 5);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x+w*0.72, y+h*0.08, w*0.18, h*0.28, 5);
  ctx.fill();
  // Cute face
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x+w*0.50, y+h*0.50, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x+w*0.48, y+h*0.50, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+w*0.56, y+h*0.50, 2.5, 0, Math.PI*2);
  ctx.fill();
}

function drawRock(obs) {
  const {x,y,w,h} = obs;
  ctx.fillStyle = '#9e8a7a';
  ctx.beginPath();
  ctx.ellipse(x+w*0.5, y+h*0.65, w*0.48, h*0.40, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#b8a898';
  ctx.beginPath();
  ctx.ellipse(x+w*0.45, y+h*0.50, w*0.38, h*0.32, -0.2, 0, Math.PI*2);
  ctx.fill();
  // Face
  ctx.fillStyle = '#7a6a5a';
  ctx.beginPath();
  ctx.arc(x+w*0.38, y+h*0.55, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+w*0.55, y+h*0.53, 3, 0, Math.PI*2);
  ctx.fill();
  // Smile
  ctx.strokeStyle='#7a6a5a'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.arc(x+w*0.46, y+h*0.60, 5, 0, Math.PI);
  ctx.stroke();
}

function drawBird(obs) {
  const {x,y,w,h} = obs;
  const wingFlap = Math.sin(frame*0.28)*0.45;
  const cx = x+w*0.5, cy = y+h*0.5;
  
  // Shadow under bird
  ctx.fillStyle='rgba(0,0,80,0.12)';
  ctx.beginPath();
  ctx.ellipse(cx, GY+3, w*0.4, 4, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Left wing
  ctx.save();
  ctx.translate(cx-w*0.12, cy-h*0.05);
  ctx.rotate(-wingFlap);
  ctx.fillStyle = '#4a22cc';
  ctx.beginPath();
  ctx.ellipse(-w*0.26, 0, w*0.30, h*0.14, -0.25, 0, Math.PI*2);
  ctx.fill();
  // Wing highlight
  ctx.fillStyle = '#6a44ee';
  ctx.beginPath();
  ctx.ellipse(-w*0.24, -h*0.02, w*0.18, h*0.07, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  // Right wing
  ctx.save();
  ctx.translate(cx+w*0.12, cy-h*0.05);
  ctx.rotate(wingFlap);
  ctx.fillStyle = '#4a22cc';
  ctx.beginPath();
  ctx.ellipse(w*0.26, 0, w*0.30, h*0.14, 0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#6a44ee';
  ctx.beginPath();
  ctx.ellipse(w*0.24, -h*0.02, w*0.18, h*0.07, 0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  // Body
  ctx.fillStyle = '#5528dd';
  ctx.beginPath();
  ctx.ellipse(cx, cy+h*0.05, w*0.30, h*0.28, 0, 0, Math.PI*2);
  ctx.fill();
  // Belly
  ctx.fillStyle = '#7755ff';
  ctx.beginPath();
  ctx.ellipse(cx-w*0.02, cy+h*0.10, w*0.18, h*0.18, 0.1, 0, Math.PI*2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#5528dd';
  ctx.beginPath();
  ctx.ellipse(cx+w*0.22, cy-h*0.22, w*0.20, h*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  // Crest / tuft
  ctx.fillStyle = '#3311aa';
  ctx.beginPath();
  ctx.moveTo(cx+w*0.22, cy-h*0.44);
  ctx.quadraticCurveTo(cx+w*0.14, cy-h*0.38, cx+w*0.18, cy-h*0.28);
  ctx.quadraticCurveTo(cx+w*0.28, cy-h*0.36, cx+w*0.22, cy-h*0.44);
  ctx.fill();
  
  // Eye white
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx+w*0.28, cy-h*0.25, h*0.085, 0, Math.PI*2);
  ctx.fill();
  // Pupil
  ctx.fillStyle = '#110033';
  ctx.beginPath();
  ctx.arc(cx+w*0.30, cy-h*0.24, h*0.048, 0, Math.PI*2);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx+w*0.32, cy-h*0.265, h*0.018, 0, Math.PI*2);
  ctx.fill();
  // Blush
  ctx.fillStyle = 'rgba(200,100,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(cx+w*0.33, cy-h*0.16, w*0.065, h*0.04, 0.2, 0, Math.PI*2);
  ctx.fill();
  
  // Beak
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(cx+w*0.42, cy-h*0.22);
  ctx.lineTo(cx+w*0.50, cy-h*0.18);
  ctx.lineTo(cx+w*0.42, cy-h*0.13);
  ctx.closePath();
  ctx.fill();
  
  // Tail feathers
  ctx.fillStyle = '#3311aa';
  ctx.beginPath();
  ctx.moveTo(cx-w*0.18, cy+h*0.18);
  ctx.quadraticCurveTo(cx-w*0.38, cy+h*0.38, cx-w*0.32, cy+h*0.45);
  ctx.quadraticCurveTo(cx-w*0.20, cy+h*0.32, cx-w*0.08, cy+h*0.28);
  ctx.closePath();
  ctx.fill();
}

function drawCoin(obs) {
  const {x,y,w,h} = obs;
  const cx = x + w*0.5, cy = y + h*0.5, r = w*0.5;
  const bob = Math.sin(frame*0.08 + x*0.01)*4;
  
  // Glow
  ctx.save();
  ctx.shadowColor = 'rgba(255,200,0,0.6)';
  ctx.shadowBlur = 10;
  
  // Coin body
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(cx, cy+bob, r, 0, Math.PI*2);
  ctx.fill();
  
  // Inner shine ring
  ctx.fillStyle = '#ffe84d';
  ctx.beginPath();
  ctx.arc(cx-r*0.1, cy+bob-r*0.1, r*0.7, 0, Math.PI*2);
  ctx.fill();
  
  ctx.shadowBlur = 0;
  ctx.restore();
  
  // Star shape in center
  ctx.fillStyle = '#ff9900';
  ctx.save();
  ctx.translate(cx, cy+bob);
  ctx.rotate(frame*0.04);
  ctx.beginPath();
  for (let i=0;i<5;i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const ai = a + 2*Math.PI/5;
    i===0 ? ctx.moveTo(Math.cos(a)*r*0.42, Math.sin(a)*r*0.42) : ctx.lineTo(Math.cos(a)*r*0.42, Math.sin(a)*r*0.42);
    ctx.lineTo(Math.cos(ai)*r*0.18, Math.sin(ai)*r*0.18);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  
  // "+50" floating label
  ctx.fillStyle = '#cc7700';
  ctx.font = `bold ${Math.round(w*0.28)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('+50', cx, cy+bob+r+12);
  ctx.textAlign = 'left';
}

function drawCloud(c) {
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, c.w*0.5, c.w*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x-c.w*0.18, c.y+2, c.w*0.28, c.w*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x+c.w*0.18, c.y+3, c.w*0.26, c.w*0.16, 0, 0, Math.PI*2);
  ctx.fill();
}

function spawnParticles(x, y, color) {
  for (let i=0;i<12;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1,color});
  }
}

// ── Collision ──────────────────────────────────────────
function checkCollision(obs) {
  const margin = 8;
  const dx = dino.x + margin;
  const dy = dino.y + margin;
  const dw = dino.w - margin*2;
  const dh = dino.h - margin*2;
  return dx < obs.x+obs.w-margin && dx+dw > obs.x+margin &&
         dy < obs.y+obs.h-margin && dy+dh > obs.y+margin;
}

// ── Game logic ─────────────────────────────────────────
function startGame() {
  lives = 3;
  score = 0;
  lastScoreSound = 0;
  frame = 0;
  speed = baseSpeed;
  obstacles = [];
  obsCooldown = 80;
  particles = [];
  invincible = 0;
  dino.y = GY - dino.h;
  dino.vy = 0;
  dino.onGround = true;
  dino.legPhase = 0;
  state = 'playing';
  overlay.classList.remove('show');
  document.getElementById('pause-overlay').classList.remove('show');
  startBGM();
  updateHUD();
}

function pauseGame() {
  if (state !== 'playing') return;
  state = 'paused';
  pauseBGM();
  document.getElementById('pause-overlay').classList.add('show');
  document.getElementById('pause-btn').textContent = '▶';
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  resumeBGM();
  document.getElementById('pause-overlay').classList.remove('show');
  document.getElementById('pause-btn').textContent = '⏸';
}

function loseLife() {
  lives--;
  invincible = 90;
  playSound('hit');
  spawnParticles(dino.x+dino.w*0.5, dino.y+dino.h*0.5, '#ff6666');
  updateHUD();
  if (lives <= 0) {
    setTimeout(gameOver, 600);
  }
}

function gameOver() {
  state = 'gameover';
  stopBGM();
  if (score > hiScore) { hiScore = score; localStorage.setItem('dino_hi', hiScore); }
  overlayEmoji.textContent = '😢';
  overlayTitle.textContent = 'ゲームオーバー';
  overlaySub.textContent = 'またあそんでね！';
  overlayScore.style.display = 'block';
  overlayScore.textContent = `スコア: ${fmtScore(score)}`;
  startBtn.textContent = 'もう一度 ▶';
  overlay.classList.add('show');
  updateHUD();
}

function fmtScore(n) { return String(Math.floor(n)).padStart(5,'0'); }

function updateHUD() {
  scoreEl.textContent = fmtScore(score);
  hiEl.textContent = 'BEST: ' + fmtScore(hiScore);
  livesEl.innerHTML = '';
  for (let i=0;i<3;i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i >= lives ? ' lost' : '');
    h.textContent = i < lives ? '💚' : '🤍';
    livesEl.appendChild(h);
  }
}

// ── Main loop ──────────────────────────────────────────
let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-last)/16.67, 2);
  last = ts;

  if (state === 'paused') { draw(); return; }
  
  if (state === 'playing') {
    frame++;
    score += speed * 0.04;
    
    // Smooth, gradual speed increase instead of sudden spikes
    speed += 0.001 * dt;
    
    // Play sound on 100-point milestones
    const currentScoreFloor = Math.floor(score);
    if (currentScoreFloor > 0 && currentScoreFloor % 100 === 0 && currentScoreFloor !== lastScoreSound) {
      playSound('score');
      lastScoreSound = currentScoreFloor;
    }
    
    // Gravity
    dino.vy += 0.75 * dt;
    dino.y += dino.vy * dt;
    if (dino.y >= GY - dino.h) { dino.y = GY - dino.h; dino.vy = 0; dino.onGround = true; }
    else dino.onGround = false;
    
    if (dino.onGround) dino.legPhase += 0.22 * speed * dt;
    
    // Obstacles
    obsCooldown -= dt;
    if (obsCooldown <= 0) {
      const type = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
      const w = type === 'coin' ? 32 : type === 'bird' ? 44 : 40 + Math.random()*20;
      const h = type === 'coin' ? 32 : type === 'bird' ? 34 : 45 + Math.random()*25;
      let oy = GY - h;
      if (type === 'coin') oy = GY - dino.h*0.5 - 20 - Math.random()*60;
      if (type === 'bird') oy = GY - dino.h - 30 - Math.random()*55;
      obstacles.push({type, x: W+20, y: oy, w, h, collected: false});
      obsCooldown = 70 + Math.random()*80 - speed*3;
      if (obsCooldown < 40) obsCooldown = 40;
    }
    obstacles.forEach(o => o.x -= speed * dt);
    obstacles = obstacles.filter(o => o.x > -80);
    
    // Collision
    if (invincible > 0) invincible -= dt;
    else {
      for (const obs of obstacles) {
        if (obs.collected) continue;
        if (checkCollision(obs)) {
          if (obs.type === 'coin') {
            obs.collected = true;
            score += 50;
            playSound('coin');
            spawnParticles(obs.x+obs.w*0.5, obs.y+obs.h*0.5, '#ffd700');
          } else {
            loseLife(); break;
          }        }
      }
    }
    
    // Clouds
    clouds.forEach(c => { c.x -= c.speed * dt; if (c.x < -80) { c.x = W+80; c.y = 15+Math.random()*40; } });
    
    updateHUD();
  }
  
  // Particles always update
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.04; });
  particles = particles.filter(p=>p.life>0);
  
  draw();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#d0efff');
  sky.addColorStop(1,'#e8f8e8');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,GY);
  
  // Stars/sparkles
  bgStars.forEach(s => {
    const twinkle = 0.5 + 0.5*Math.sin(frame*0.05+s.phase);
    ctx.fillStyle = `rgba(255,240,100,${s.a*twinkle})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  
  // Clouds
  clouds.forEach(drawCloud);
  
  // Distant mountains
  ctx.fillStyle = '#b8e0b8';
  ctx.beginPath();
  ctx.moveTo(0, GY-20);
  [0.1,0.2,0.35,0.5,0.65,0.8,0.95].forEach((xf,i) => {
    const mh = 30+Math.sin(i*1.7)*20;
    ctx.lineTo(xf*W, GY-20-mh);
  });
  ctx.lineTo(W, GY-20);
  ctx.closePath();
  ctx.fill();
  
  // Ground
  ctx.fillStyle = '#88cc88';
  ctx.fillRect(0, GY, W, H-GY);
  ctx.fillStyle = '#70b870';
  ctx.fillRect(0, GY, W, 6);
  // Ground pattern dots
  ctx.fillStyle = '#60a860';
  for (let gx=0;gx<W;gx+=20) {
    ctx.beginPath();
    ctx.arc(gx + (frame*speed*0.5)%20, GY+3, 2, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Obstacles
  obstacles.forEach(o => {
    if (o.collected) return;
    if (o.type==='cactus') drawCactus(o);
    else if (o.type==='rock') drawRock(o);
    else if (o.type==='bird') drawBird(o);
    else drawCoin(o);
  });
  
  // Dino
  const isInvincible = invincible > 0;
  const alpha = isInvincible ? (Math.sin(frame*0.4)>0 ? 0.4 : 1.0) : 1.0;
  const shaking = lives<3 && isInvincible && invincible > 60;
  drawDino(dino.x, dino.y, dino.legPhase, alpha, shaking);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,80,0,0.15)';
  const shadowW = dino.w * 0.8 * (1 - Math.min((GY-dino.h-dino.y)/100,0.6));
  ctx.beginPath();
  ctx.ellipse(dino.x+dino.w*0.5, GY+4, shadowW*0.5, 4, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  
  // Score milestone flash
  if (state==='playing' && Math.floor(score)%100===0 && Math.floor(score)>0 && frame%6<3) {
    ctx.fillStyle='rgba(255,220,80,0.25)';
    ctx.fillRect(0,0,W,H);
  }
}

// ── Input ──────────────────────────────────────────────
function handleJump() {
  if (state === 'paused') { resumeGame(); return; }
  if (state === 'playing') dino.jump();
}

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); handleJump(); }
  if (e.code==='Escape'||e.code==='KeyP') {
    e.preventDefault();
    if (state==='playing') pauseGame();
    else if (state==='paused') resumeGame();
  }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); }, {passive:false});
canvas.addEventListener('click', handleJump);

startBtn.addEventListener('click', e => { e.stopPropagation(); startGame(); });
startBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startGame(); }, {passive:false});

const pauseBtn = document.getElementById('pause-btn');
pauseBtn.addEventListener('click', e => { e.stopPropagation(); if (state==='playing') pauseGame(); else if (state==='paused') resumeGame(); });
pauseBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); if (state==='playing') pauseGame(); else if (state==='paused') resumeGame(); }, {passive:false});

const musicBtn = document.getElementById('music-btn');
musicBtn.addEventListener('click', e => { e.stopPropagation(); toggleMusic(); });
musicBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); toggleMusic(); }, {passive:false});

const resumeBtn = document.getElementById('resume-btn');
resumeBtn.addEventListener('click', e => { e.stopPropagation(); resumeGame(); });
resumeBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); resumeGame(); }, {passive:false});

// ── PWA ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Init ───────────────────────────────────────────────
updateHUD();

// idle animation
function idleLoop(ts) {
  requestAnimationFrame(idleLoop);
}

requestAnimationFrame(loop);
</script>
